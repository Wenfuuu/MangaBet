<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<meta name="design_doc_mode" content="canvas">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,700&display=swap" rel="stylesheet">
<style>
  body { margin: 0; }
  .label { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #8a7a64; margin-bottom: 10px; letter-spacing: 0.08em; text-transform: uppercase; }
  .frame { display: flex; flex-direction: column; align-items: flex-start; }
</style>
</head>
<body>

<!-- App icon (rounded square badge) -->
<div class="frame" style="position:absolute; left: 40px; top: 40px;">
  <div class="label">App icon — 512×512</div>
  <svg width="220" height="220" viewBox="0 0 512 512">
    <defs>
      <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#1a140f"/><stop offset="55%" stop-color="#0f0b08"/><stop offset="100%" stop-color="#050403"/>
      </linearGradient>
      <radialGradient id="glow1" cx="50%" cy="42%" r="60%">
        <stop offset="0%" stop-color="#3a2a1f" stop-opacity="0.9"/><stop offset="100%" stop-color="#3a2a1f" stop-opacity="0"/>
      </radialGradient>
      <pattern id="grain1" width="4" height="4" patternUnits="userSpaceOnUse">
        <rect width="4" height="4" fill="transparent"/><circle cx="1" cy="1" r="0.6" fill="#000" opacity="0.35"/><circle cx="3" cy="2.5" r="0.5" fill="#000" opacity="0.25"/>
      </pattern>
      <filter id="soft1" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.45"/></filter>
    </defs>
    <rect width="512" height="512" rx="116" fill="url(#bg1)"/>
    <rect width="512" height="512" rx="116" fill="url(#glow1)"/>
    <rect width="512" height="512" rx="116" fill="url(#grain1)"/>
    <g filter="url(#soft1)">
      <circle cx="256" cy="256" r="206" fill="none" stroke="#5a4232" stroke-width="2" opacity="0.55"/>
      <circle cx="256" cy="256" r="192" fill="none" stroke="#c9a37a" stroke-width="3" opacity="0.6"/>
      <g stroke="#c9a37a" stroke-width="2.5" opacity="0.35">
        <line x1="256" y1="52" x2="256" y2="68"/><line x1="256" y1="444" x2="256" y2="460"/>
        <line x1="52" y1="256" x2="68" y2="256"/><line x1="444" y1="256" x2="460" y2="256"/>
        <line x1="112" y1="112" x2="123" y2="123"/><line x1="389" y1="389" x2="400" y2="400"/>
        <line x1="112" y1="400" x2="123" y2="389"/><line x1="389" y1="123" x2="400" y2="112"/>
      </g>
      <text x="252" y="338" text-anchor="end" font-family="Georgia, 'Times New Roman', serif" font-weight="500" font-size="196" fill="#e8dccb">B</text>
      <text x="254" y="342" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="196" fill="#c9a37a">T</text>
    </g>
    <rect width="512" height="512" rx="116" fill="none" stroke="#000" stroke-opacity="0.3" stroke-width="2"/>
  </svg>
</div>

<!-- Maskable icon -->
<div class="frame" style="position:absolute; left: 320px; top: 40px;">
  <div class="label">Maskable icon — safe zone 80%</div>
  <svg width="220" height="220" viewBox="0 0 512 512">
    <defs>
      <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#1a140f"/><stop offset="55%" stop-color="#0f0b08"/><stop offset="100%" stop-color="#050403"/>
      </linearGradient>
      <radialGradient id="glow2" cx="50%" cy="42%" r="60%">
        <stop offset="0%" stop-color="#3a2a1f" stop-opacity="0.9"/><stop offset="100%" stop-color="#3a2a1f" stop-opacity="0"/>
      </radialGradient>
      <pattern id="grain2" width="4" height="4" patternUnits="userSpaceOnUse">
        <rect width="4" height="4" fill="transparent"/><circle cx="1" cy="1" r="0.6" fill="#000" opacity="0.35"/><circle cx="3" cy="2.5" r="0.5" fill="#000" opacity="0.25"/>
      </pattern>
    </defs>
    <rect width="512" height="512" fill="url(#bg2)"/>
    <rect width="512" height="512" fill="url(#glow2)"/>
    <rect width="512" height="512" fill="url(#grain2)"/>
    <g transform="translate(256,256) scale(0.8) translate(-256,-256)">
      <circle cx="256" cy="256" r="206" fill="none" stroke="#5a4232" stroke-width="2" opacity="0.55"/>
      <circle cx="256" cy="256" r="192" fill="none" stroke="#c9a37a" stroke-width="3" opacity="0.6"/>
      <g stroke="#c9a37a" stroke-width="2.5" opacity="0.35">
        <line x1="256" y1="52" x2="256" y2="68"/><line x1="256" y1="444" x2="256" y2="460"/>
        <line x1="52" y1="256" x2="68" y2="256"/><line x1="444" y1="256" x2="460" y2="256"/>
        <line x1="112" y1="112" x2="123" y2="123"/><line x1="389" y1="389" x2="400" y2="400"/>
        <line x1="112" y1="400" x2="123" y2="389"/><line x1="389" y1="123" x2="400" y2="112"/>
      </g>
      <text x="252" y="338" text-anchor="end" font-family="Georgia, 'Times New Roman', serif" font-weight="500" font-size="196" fill="#e8dccb">B</text>
      <text x="254" y="342" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="196" fill="#c9a37a">T</text>
    </g>
    <!-- safe zone guide (not part of final asset) -->
    <circle cx="256" cy="256" r="204.8" fill="none" stroke="#ff5555" stroke-width="1" stroke-dasharray="6 6" opacity="0.4"/>
  </svg>
</div>

<!-- Favicon -->
<div class="frame" style="position:absolute; left: 600px; top: 40px;">
  <div class="label">Favicon — simplified, 64×64</div>
  <svg width="64" height="64" viewBox="0 0 512 512" style="background:#0b0908; border-radius: 14px;">
    <defs>
      <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#1a140f"/><stop offset="100%" stop-color="#050403"/>
      </linearGradient>
    </defs>
    <rect width="512" height="512" fill="url(#bg3)"/>
    <circle cx="256" cy="256" r="200" fill="none" stroke="#c9a37a" stroke-width="10" opacity="0.7"/>
    <text x="250" y="345" text-anchor="end" font-family="Georgia, serif" font-weight="500" font-size="210" fill="#e8dccb">B</text>
    <text x="256" y="350" text-anchor="start" font-family="Georgia, serif" font-weight="700" font-size="210" fill="#c9a37a">T</text>
  </svg>
  <div style="display:flex; gap: 8px; margin-top: 12px; align-items:center;">
    <svg width="20" height="20" viewBox="0 0 512 512" style="border-radius: 5px;">
      <rect width="512" height="512" fill="#0b0908"/>
      <circle cx="256" cy="256" r="200" fill="none" stroke="#c9a37a" stroke-width="14" opacity="0.7"/>
      <text x="250" y="345" text-anchor="end" font-family="Georgia, serif" font-weight="500" font-size="210" fill="#e8dccb">B</text>
      <text x="256" y="350" text-anchor="start" font-family="Georgia, serif" font-weight="700" font-size="210" fill="#c9a37a">T</text>
    </svg>
    <span style="font-family: Inter, sans-serif; font-size: 11px; color: #8a7a64;">at 20px (tab size)</span>
  </div>
</div>

<!-- Full lockup, on dark surface -->
<div class="frame" style="position:absolute; left: 40px; top: 320px;">
  <div class="label">Full lockup — navbar / splash</div>
  <div style="background:#0b0908; padding: 28px 36px; border-radius: 10px; display:inline-flex; align-items:center; gap:16px;">
    <svg width="44" height="44" viewBox="0 0 512 512" style="flex-shrink:0;">
      <defs>
        <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#1a140f"/><stop offset="100%" stop-color="#050403"/>
        </linearGradient>
      </defs>
      <rect width="512" height="512" rx="116" fill="url(#bg4)"/>
      <circle cx="256" cy="256" r="192" fill="none" stroke="#c9a37a" stroke-width="10" opacity="0.65"/>
      <text x="250" y="345" text-anchor="end" font-family="Georgia, serif" font-weight="500" font-size="210" fill="#e8dccb">B</text>
      <text x="256" y="350" text-anchor="start" font-family="Georgia, serif" font-weight="700" font-size="210" fill="#c9a37a">T</text>
    </svg>
    <div style="font-family: 'Source Serif 4', serif; font-size: 34px; letter-spacing: -0.01em; white-space: nowrap;">
      <span style="color:#e8dccb; font-weight:500;">Manga</span><span style="color:#c9a37a; font-weight:700;">Bet</span>
    </div>
  </div>
</div>

<!-- Splash screen mock -->
<div class="frame" style="position:absolute; left: 40px; top: 470px;">
  <div class="label">Splash screen — 390×720 mock</div>
  <div style="width: 300px; height: 554px; background: radial-gradient(ellipse at 50% 38%, #1a140f 0%, #0b0908 65%); border-radius: 28px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap: 22px; border: 1px solid rgba(160,130,100,0.15);">
    <svg width="90" height="90" viewBox="0 0 512 512">
      <defs>
        <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#1a140f"/><stop offset="100%" stop-color="#050403"/>
        </linearGradient>
      </defs>
      <rect width="512" height="512" rx="116" fill="url(#bg5)"/>
      <circle cx="256" cy="256" r="192" fill="none" stroke="#c9a37a" stroke-width="8" opacity="0.65"/>
      <text x="250" y="345" text-anchor="end" font-family="Georgia, serif" font-weight="500" font-size="210" fill="#e8dccb">B</text>
      <text x="256" y="350" text-anchor="start" font-family="Georgia, serif" font-weight="700" font-size="210" fill="#c9a37a">T</text>
    </svg>
    <div style="font-family: 'Source Serif 4', serif; font-size: 26px; letter-spacing: -0.01em;">
      <span style="color:#e8dccb; font-weight:500;">Manga</span><span style="color:#c9a37a; font-weight:700;">Bet</span>
    </div>
  </div>
</div>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100"><rect width="100" height="100" fill="#0b0908"/><circle cx="50" cy="50" r="30" fill="none" stroke="#c9a37a" stroke-width="4"/><text x="50" y="60" text-anchor="middle" font-family="serif" font-size="30" fill="#e8dccb">BT</text></svg>
</template>

</body></html>
